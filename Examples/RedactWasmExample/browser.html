<!doctype html>
<!-- Browser example for packages/redact-node with local WebAssembly and onnxruntime-web. -->
<html>
<body>
<script type="importmap">
  {
    "imports": {
      "@bjorn3/browser_wasi_shim": "/node_modules/@bjorn3/browser_wasi_shim/dist/index.js",
      "@desert-ant-labs/redact": "/node_modules/@desert-ant-labs/redact/index.js",
      "onnxruntime-web": "/node_modules/onnxruntime-web/dist/ort.min.mjs"
    }
  }
</script>
<script type="module">
  import * as ort from "onnxruntime-web";
  ort.env.wasm.wasmPaths = "/node_modules/onnxruntime-web/dist/";

  async function run() {
    const { Redact } = await import("@desert-ant-labs/redact");
    // Redact downloads, verifies, and caches the model from the Hub;
    // onnxruntime-web runs inference.
    const redact = await Redact.load({ ort });

    const text = "Hi, I'm Anna Kowalska. Email me at anna.k@example.com or call +1 (555) 010-4477. " +
      "I live at 123 Any Street, Apt 4B, Seattle, WA 98109. Card: 4539 1488 0343 6467.";
    const start = performance.now();
    const r = await redact.redaction(text);
    return {
      redactedText: r.redactedText,
      items: r.items,
      ms: Math.round(performance.now() - start),
    };
  }

  run().then(r => { window.__result = r; }, e => { window.__error = String(e && e.stack || e); });
</script>
</body>
</html>
